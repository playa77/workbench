# Workbench default configuration
# Override via .env, per-user DB settings, or environment variables (WORKBENCH_*)

[general]
log_level = "INFO"
data_dir = "data"

[api]
host = "127.0.0.1"
port = 8420
cors_origins = ["http://localhost:8420"]

[database]
url_env = "DATABASE_URL"

[openrouter]
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
default_model = "deepseek/deepseek-v4-pro"
timeout_seconds = 120
max_retries = 2

[encryption]
key_env = "ENCRYPTION_KEY"

[auth]
api_key_prefix = "wb"
max_keys_per_user = 5
allow_registration = true
session_expiry_hours = 24

[rate_limit]
enabled = true
auth = "5/minute"
agents = "60/minute"
general = "120/minute"
