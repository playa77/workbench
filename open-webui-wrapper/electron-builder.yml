appId: com.owui-wrapper
productName: Open WebUI
directories:
  output: release/
files:
  - dist/**
  - package.json
afterPack: scripts/after-pack.js
linux:
  target:
    - deb
    - AppImage
  category: Network
  synopsis: Open WebUI desktop wrapper
deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libdrm2
    - libgbm1
  fpm:
    - "--conflicts=open-webui"
    - "--replaces=open-webui"
