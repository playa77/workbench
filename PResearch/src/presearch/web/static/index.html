<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PResearch — Web UI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .container { max-width: 960px; margin: 0 auto; padding: 16px; }

  .header { text-align: center; padding: 24px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .header h1 { color: var(--accent); font-size: 20px; letter-spacing: 2px; }
  .header .sub { color: var(--dim); font-size: 12px; margin-top: 4px; }

  .query-section { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .query-section textarea {
    width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none;
    resize: vertical; min-height: 88px; line-height: 1.5;
  }
  .query-section textarea:focus { border-color: var(--accent); }
  .query-buttons { display: flex; gap: 8px; }
  .btn {
    padding: 10px 20px; border: none; border-radius: 6px; font-family: var(--font);
    font-size: 13px; cursor: pointer; font-weight: 600; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .settings-toggle { color: var(--dim); font-size: 12px; cursor: pointer; margin-bottom: 8px; display: inline-block; }
  .settings-toggle:hover { color: var(--text); }
  .settings-panel {
    display: none; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; margin-bottom: 12px;
  }
  .settings-panel.open { display: block; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .setting-field label { display: block; color: var(--dim); font-size: 11px; margin-bottom: 2px; }
  .setting-field input, .setting-field select {
    width: 100%; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: var(--font); font-size: 12px; outline: none;
  }
  .setting-field input:focus, .setting-field select:focus { border-color: var(--accent); }
  .setting-field select option { background: var(--bg); color: var(--text); }
  .setting-field .checkbox-wrap { display: flex; align-items: center; gap: 6px; padding: 6px 0; }
  .setting-field .checkbox-wrap input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
  .setting-field .model-custom { margin-top: 4px; display: none; }
  .setting-field .model-custom.visible { display: block; }

  .stats-bar {
    display: flex; gap: 16px; padding: 8px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px;
    font-size: 12px; color: var(--dim);
  }
  .stats-bar .stat-val { color: var(--green); font-weight: 600; }

  .log-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    max-height: 400px; overflow-y: auto; padding: 12px; margin-bottom: 12px;
    font-size: 13px; line-height: 1.6;
  }
  .log-entry { padding: 2px 0; }
  .log-entry.action { color: var(--text); }
  .log-entry.thinking { color: var(--yellow); font-style: italic; }
  .log-entry.result { color: var(--dim); padding-left: 20px; }
  .log-entry.info { color: var(--dim); }
  .log-entry.error { color: var(--red); }

  .interrupt-section { display: none; gap: 8px; margin-bottom: 12px; }
  .interrupt-section.active { display: flex; }
  .interrupt-section input { flex: 1; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 13px; }

  .report-section {
    display: none; background: var(--surface); border: 1px solid var(--green);
    border-radius: 6px; padding: 20px; margin-bottom: 16px;
  }
  .report-section.visible { display: block; }
  .report-section h2, .report-section h3 { color: var(--accent); margin: 16px 0 8px; }
  .report-section h1 { color: var(--green); font-size: 18px; margin-bottom: 12px; }
  .report-section p { line-height: 1.7; margin-bottom: 10px; }
  .report-section ul, .report-section ol { padding-left: 20px; margin-bottom: 10px; }
  .report-section code { background: var(--bg); padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  .report-section pre { background: var(--bg); padding: 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 10px; }
  .report-section blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--dim); margin-bottom: 10px; }
  .report-section table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
  .report-section th, .report-section td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .report-section th { background: var(--bg); }

  .past-reports { margin-top: 16px; }
  .past-reports h3 { color: var(--dim); font-size: 13px; margin-bottom: 8px; border-top: 1px solid var(--border); padding-top: 16px; }
  .report-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 6px; cursor: pointer;
  }
  .report-item:hover { border-color: var(--accent); }
  .report-item .query-text { flex: 1; font-size: 13px; }
  .report-item .meta { color: var(--dim); font-size: 11px; margin-left: 12px; white-space: nowrap; }
  .report-item .del-btn { color: var(--red); cursor: pointer; margin-left: 8px; font-size: 12px; border: none; background: none; font-family: var(--font); }
  .report-item .del-btn:hover { text-decoration: underline; }

  .interview-container {
    display: none; background: var(--surface); border: 1px solid var(--yellow);
    border-radius: 6px; padding: 16px; margin-bottom: 12px;
  }
  .interview-container.active { display: block; }
  .interview-container h3 { color: var(--yellow); font-size: 14px; margin-bottom: 8px; }
  .interview-messages {
    max-height: 300px; overflow-y: auto; margin-bottom: 12px; font-size: 13px; line-height: 1.6;
  }
  .interview-msg { padding: 6px 0; white-space: pre-wrap; }
  .interview-msg.assistant { color: var(--text); }
  .interview-msg.system { color: var(--dim); font-size: 12px; }
  .interview-answer-row { display: flex; gap: 8px; }
  .interview-answer-row input {
    flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 13px;
  }
  .interview-answer-row input:focus { border-color: var(--yellow); }

  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.connected { background: var(--green); }
  .status-dot.disconnected { background: var(--red); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>PRESEARCH</h1>
    <div class="sub">Autonomous Deep Research Agent &mdash; <span class="status-dot disconnected" id="statusDot"></span><span id="statusText">Disconnected</span></div>
  </div>

  <div class="query-section">
    <textarea id="queryInput" placeholder="Enter your research query..." rows="4"></textarea>
    <div class="query-buttons">
      <button class="btn btn-primary" id="startBtn" disabled>Start Research</button>
      <button class="btn btn-secondary" id="refineBtn" disabled>Refine Question</button>
    </div>
  </div>

  <div class="interview-container" id="interviewContainer">
    <h3>Interview — Question Refinement</h3>
    <div class="interview-messages" id="interviewMessages"></div>
    <div class="interview-answer-row" id="interviewAnswerRow">
      <input type="text" id="interviewAnswer" placeholder="Type your answer..." />
      <button class="btn btn-primary btn-sm" id="sendInterviewAnswer">Send</button>
      <button class="btn btn-secondary btn-sm" id="cancelInterview">Cancel</button>
    </div>
    <div id="interviewConfirmRow" style="display:none">
      <p style="color:var(--dim);margin-bottom:8px">Ready to finalize the refined question?</p>
      <button class="btn btn-primary btn-sm" id="confirmRefine">Proceed to Delivery</button>
      <button class="btn btn-secondary btn-sm" id="rejectRefine">Ask More Questions</button>
      <button class="btn btn-secondary btn-sm" id="cancelRefine">Cancel</button>
    </div>
  </div>

  <span class="settings-toggle" id="settingsToggle">&#9881; Settings</span>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid" id="settingsGrid"></div>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <span>Iteration: <span class="stat-val" id="statIter">0</span></span>
    <span>Sources: <span class="stat-val" id="statSources">0</span></span>
    <span>Tokens: <span class="stat-val" id="statTokens">0</span></span>
    <span>Session: <span class="stat-val" id="statSession">—</span></span>
  </div>

  <div class="log-section" id="logSection" style="display:none"></div>

  <div class="interrupt-section" id="interruptSection">
    <input type="text" id="interruptInput" placeholder="Redirect the agent or type 'stop'..." />
    <button class="btn btn-secondary" id="sendInterrupt">Send</button>
    <button class="btn btn-danger" id="stopBtn">Stop</button>
  </div>

  <div class="report-section" id="reportSection"></div>

  <div class="past-reports" id="pastReports">
    <h3>Past Reports</h3>
    <div id="reportsList"></div>
  </div>
</div>

<script>
(function() {
  const $ = id => document.getElementById(id);
  let ws = null, sessionId = null, running = false;

  const queryInput = $('queryInput'), startBtn = $('startBtn'), refineBtn = $('refineBtn');
  const logSection = $('logSection'), statsBar = $('statsBar');
  const interruptSection = $('interruptSection'), interruptInput = $('interruptInput');
  const reportSection = $('reportSection'), reportsList = $('reportsList');
  const statusDot = $('statusDot'), statusText = $('statusText');
  const interviewContainer = $('interviewContainer'), interviewMessages = $('interviewMessages');
  const interviewAnswer = $('interviewAnswer'), sendInterviewAnswer = $('sendInterviewAnswer');
  const cancelInterview = $('cancelInterview');
  const interviewAnswerRow = $('interviewAnswerRow'), interviewConfirmRow = $('interviewConfirmRow');
  const confirmRefine = $('confirmRefine'), rejectRefine = $('rejectRefine'), cancelRefine = $('cancelRefine');

  let interviewActive = false, refineIdea = '';

  // ── localStorage settings persistence ──
  const STORAGE_KEY = 'presearch_settings';

  function saveSettings() {
    const data = {};
    document.querySelectorAll('.setting-field [name]').forEach(el => {
      if (el.type === 'checkbox') data[el.name] = el.checked;
      else data[el.name] = el.value;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadSavedSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  }

  function applySaved(el) {
    const saved = loadSavedSettings();
    if (!(el.name in saved)) return;
    const v = saved[el.name];
    if (el.type === 'checkbox') el.checked = !!v;
    else el.value = v;
  }

  function bindAutoSave(el) {
    el.addEventListener('change', saveSettings);
    el.addEventListener('input', saveSettings);
  }

  // ── WebSocket ──
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => {
      statusDot.className = 'status-dot connected';
      statusText.textContent = 'Connected';
      startBtn.disabled = false;
      refineBtn.disabled = false;
    };
    ws.onclose = () => {
      statusDot.className = 'status-dot disconnected';
      statusText.textContent = 'Disconnected';
      startBtn.disabled = true;
      refineBtn.disabled = true;
      setRunning(false);
      endInterview();
      setTimeout(connect, 2000);
    };
    ws.onmessage = (e) => {
      try { handleEvent(JSON.parse(e.data)); }
      catch (err) { console.error('WS message error:', err, e.data); }
    };
  }

  function setRunning(v) {
    running = v;
    startBtn.disabled = v || !ws || ws.readyState !== 1;
    startBtn.textContent = v ? 'Running...' : 'Start';
    interruptSection.classList.toggle('active', v);
    if (v) { statsBar.style.display = 'flex'; logSection.style.display = 'block'; }
  }

  function handleEvent(evt) {
    const d = evt.data || {};
    switch (evt.type) {
      case 'session_created':
        sessionId = d.session_id;
        $('statSession').textContent = sessionId;
        break;
      case 'start_research':
        logEntry(`Research started: "${d.query}"`, 'info');
        break;
      case 'action': {
        const icon = {'web_search':'🔍','read_webpage':'📄','execute_python':'💻',
          'update_findings':'📝','log_contradiction':'⚠️','spawn_subagent':'🤖',
          'draft_report':'📋'}[d.tool] || '⚙️';
        const ts = d.elapsed != null ? `  ${d.elapsed.toFixed(1)}s` : '';
        logEntry(`${icon} ${d.description}  ✓${ts}`, 'action');
        break;
      }
      case 'thinking':
        logEntry(`🧠 ${d.text}`, 'thinking'); break;
      case 'result_summary':
        logEntry(`→ ${d.summary}`, 'result'); break;
      case 'stats':
        $('statIter').textContent = d.iteration;
        $('statSources').textContent = d.sources;
        $('statTokens').textContent = d.tokens > 1000 ? `~${Math.round(d.tokens/1000)}K` : d.tokens;
        logEntry(`── Iteration ${d.iteration} │ Sources: ${d.sources} │ Tokens: ~${Math.round(d.tokens/1000)}K ──`, 'info');
        break;
      case 'log':
        logEntry(d.message, 'info'); break;
      case 'report':
        reportSection.classList.add('visible');
        reportSection.innerHTML = marked.parse(d.markdown || '');
        break;
      case 'total_time':
        logEntry(`✅ Done in ${d.time_str} │ Sources: ${d.sources} │ Iterations: ${d.iterations} │ Tokens: ~${Math.round(d.tokens/1000)}K`, 'info');
        break;
      case 'stopped':
        setRunning(false); loadReports(); break;
      case 'interview_question':
        addInterviewMsg(d.text || '', 'assistant');
        break;
      case 'interview_ready':
        addInterviewMsg(d.text || '', 'assistant');
        showInterviewConfirm();
        break;
      case 'interview_complete':
        queryInput.value = d.refined_query || '';
        addInterviewMsg('Refined query: ' + (d.refined_query || ''), 'system');
        if (d.summary) addInterviewMsg(d.summary, 'system');
        endInterview();
        queryInput.focus();
        break;
      case 'interview_stream':
        appendToLastInterviewMsg(d.text || '');
        break;
      case 'interview_cancelled':
        endInterview();
        break;
      case 'error':
        logEntry(`❌ ${d.message}`, 'error'); setRunning(false); break;
    }
  }

  function logEntry(text, cls) {
    const div = document.createElement('div');
    div.className = `log-entry ${cls}`;
    div.textContent = text;
    logSection.appendChild(div);
    logSection.scrollTop = logSection.scrollHeight;
  }

  // ── Start research ──
  startBtn.onclick = () => {
    const q = queryInput.value.trim();
    if (!q || !ws || ws.readyState !== 1) return;
    logSection.innerHTML = '';
    reportSection.classList.remove('visible');
    reportSection.innerHTML = '';
    endInterview();
    setRunning(true);
    const config = gatherConfig();
    ws.send(JSON.stringify({ type: 'start', query: q, config }));
  };

  // ── Refine question ──
  refineBtn.onclick = () => {
    const q = queryInput.value.trim();
    if (!q || !ws || ws.readyState !== 1) return;
    if (running) return;
    refineIdea = q;
    interviewMessages.innerHTML = '';
    interviewContainer.classList.add('active');
    interviewAnswerRow.style.display = 'flex';
    interviewConfirmRow.style.display = 'none';
    interviewAnswer.value = '';
    interviewActive = true;
    startBtn.disabled = true;
    refineBtn.disabled = true;
    addInterviewMsg('Refining: "' + q + '"', 'system');
    const config = gatherConfig();
    ws.send(JSON.stringify({ type: 'refine', idea: q, config }));
    interviewAnswer.focus();
  };

  function gatherConfig() {
    const config = {};
    document.querySelectorAll('.setting-field [name]').forEach(el => {
      if (el.classList.contains('model-custom') && !el.classList.contains('visible')) return;
      if (el.type === 'checkbox') {
        if (String(el.checked) !== el.dataset.default) config[el.name] = el.checked;
      } else if (el.type === 'password') {
        if (el.value) config[el.name] = el.value;
      } else if (el.tagName === 'SELECT' && el.dataset.role === 'model') {
        if (el.value === '__custom__') {
          const ci = el.parentElement.querySelector('.model-custom');
          if (ci && ci.value) config[el.name] = ci.value;
        } else if (el.value) {
          config[el.name] = el.value;
        }
      } else if (el.value && el.value !== el.dataset.default) {
        config[el.name] = el.type === 'number' ? Number(el.value) : el.value;
      }
    });
    return config;
  }

  // ── Interview helpers ──
  function addInterviewMsg(text, role) {
    const div = document.createElement('div');
    div.className = 'interview-msg ' + role;
    div.textContent = text;
    interviewMessages.appendChild(div);
    interviewMessages.scrollTop = interviewMessages.scrollHeight;
  }

  function appendToLastInterviewMsg(text) {
    const msgs = interviewMessages.querySelectorAll('.interview-msg.assistant');
    const last = msgs[msgs.length - 1];
    if (last) last.textContent += text;
    interviewMessages.scrollTop = interviewMessages.scrollHeight;
  }

  function showInterviewConfirm() {
    interviewAnswerRow.style.display = 'none';
    interviewConfirmRow.style.display = 'block';
  }

  function showInterviewAnswer() {
    interviewAnswerRow.style.display = 'flex';
    interviewConfirmRow.style.display = 'none';
  }

  function endInterview() {
    interviewActive = false;
    interviewContainer.classList.remove('active');
    interviewMessages.innerHTML = '';
    showInterviewAnswer();
    interviewAnswer.value = '';
    if (!running) {
      startBtn.disabled = !ws || ws.readyState !== 1;
      refineBtn.disabled = !ws || ws.readyState !== 1;
    }
  }

  sendInterviewAnswer.onclick = () => {
    const ans = interviewAnswer.value.trim();
    if (!ans || !ws) return;
    addInterviewMsg('> ' + ans, 'system');
    ws.send(JSON.stringify({ type: 'refine_answer', answer: ans }));
    interviewAnswer.value = '';
    interviewAnswer.focus();
  };

  interviewAnswer.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendInterviewAnswer.click();
  });

  cancelInterview.onclick = () => {
    if (ws) ws.send(JSON.stringify({ type: 'refine_cancel' }));
    endInterview();
  };

  confirmRefine.onclick = () => {
    if (!ws) return;
    ws.send(JSON.stringify({ type: 'refine_confirm', confirm: true }));
  };

  rejectRefine.onclick = () => {
    if (!ws) return;
    showInterviewAnswer();
    interviewAnswer.focus();
    ws.send(JSON.stringify({ type: 'refine_confirm', confirm: false }));
  };

  cancelRefine.onclick = () => {
    if (ws) ws.send(JSON.stringify({ type: 'refine_cancel' }));
    endInterview();
  };

  queryInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!running && !interviewActive) startBtn.click();
    }
  });

  // ── Interrupt ──
  $('sendInterrupt').onclick = () => {
    const msg = interruptInput.value.trim();
    if (msg && ws) { ws.send(JSON.stringify({ type: 'interrupt', message: msg })); interruptInput.value = ''; }
  };
  $('stopBtn').onclick = () => { if (ws) ws.send(JSON.stringify({ type: 'stop' })); };
  interruptInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('sendInterrupt').click(); });

  // ── Settings ──
  $('settingsToggle').onclick = () => $('settingsPanel').classList.toggle('open');

  // Model <select> elements we need to dynamically populate
  const modelSelects = {};  // { fieldName: selectElement }
  let lastFetchedProvider = null;

  async function refreshModelList() {
    const providerSel = document.querySelector('.setting-field select[name="provider"]');
    const provider = providerSel ? (providerSel.value || providerSel.dataset.default) : '';
    if (provider === lastFetchedProvider) return;
    lastFetchedProvider = provider;

    // Set loading state
    Object.values(modelSelects).forEach(sel => {
      const cur = sel.value;
      sel.innerHTML = '<option value="">Loading models...</option>';
      sel.value = cur;
    });

    try {
      const res = await fetch(`/api/models?provider=${encodeURIComponent(provider)}`);
      const data = await res.json();
      if (!Array.isArray(data)) throw new Error(data.error || 'Failed to fetch models');

      const saved = loadSavedSettings();
      Object.entries(modelSelects).forEach(([fieldName, sel]) => {
        const savedVal = saved[fieldName] || '';
        const defaultVal = sel.dataset.default || '';
        sel.innerHTML = '';

        // Default option
        const defOpt = document.createElement('option');
        defOpt.value = ''; defOpt.textContent = `(default: ${defaultVal})`;
        sel.appendChild(defOpt);

        // Model options from API
        data.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.context_window
            ? `${m.id}  (${Math.round(m.context_window/1000)}K ctx)`
            : m.id;
          sel.appendChild(opt);
        });

        // Custom option
        const customOpt = document.createElement('option');
        customOpt.value = '__custom__';
        customOpt.textContent = '(enter custom model ID...)';
        sel.appendChild(customOpt);

        // Restore saved value
        if (savedVal && savedVal !== '__custom__') {
          // Check if savedVal exists in options
          const exists = data.some(m => m.id === savedVal);
          if (!exists && savedVal) {
            // Add it as an option so it's visible
            const opt = document.createElement('option');
            opt.value = savedVal; opt.textContent = savedVal + ' (custom)';
            sel.insertBefore(opt, customOpt);
          }
          sel.value = savedVal;
        }
      });
    } catch (err) {
      console.error('Failed to fetch models:', err);
      // On error, show default + custom as fallback
      Object.entries(modelSelects).forEach(([fieldName, sel]) => {
        const defaultVal = sel.dataset.default || '';
        const saved = loadSavedSettings();
        const savedVal = saved[fieldName] || '';
        sel.innerHTML = '';
        const defOpt = document.createElement('option');
        defOpt.value = ''; defOpt.textContent = `(default: ${defaultVal})`;
        sel.appendChild(defOpt);
        if (defaultVal) {
          const opt = document.createElement('option');
          opt.value = defaultVal; opt.textContent = defaultVal;
          sel.appendChild(opt);
        }
        const customOpt = document.createElement('option');
        customOpt.value = '__custom__';
        customOpt.textContent = '(enter custom model ID...)';
        sel.appendChild(customOpt);
        if (savedVal) sel.value = savedVal;
      });
    }
  }

  fetch('/api/config').then(r => r.json()).then(data => {
    const grid = $('settingsGrid');
    const saved = loadSavedSettings();

    (data.fields || []).forEach(f => {
      if (f.name === 'model_config') return;
      const div = document.createElement('div');
      div.className = 'setting-field';
      const label = document.createElement('label');
      label.textContent = f.name;
      div.appendChild(label);

      if (f.widget === 'select') {
        const sel = document.createElement('select');
        sel.name = f.name;
        sel.dataset.default = f.default ?? '';
        const emptyOpt = document.createElement('option');
        emptyOpt.value = ''; emptyOpt.textContent = `(default: ${f.default || 'none'})`;
        sel.appendChild(emptyOpt);
        (f.choices || []).forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          sel.appendChild(opt);
        });
        applySaved(sel);
        if (!sel.value && f.current) sel.value = f.current;
        bindAutoSave(sel);
        div.appendChild(sel);
        if (f.name === 'provider') {
          sel.addEventListener('change', () => { lastFetchedProvider = null; refreshModelList(); });
        }
      } else if (f.widget === 'combo') {
        // Model fields: real <select> dropdown + hidden custom text input
        const sel = document.createElement('select');
        sel.name = f.name;
        sel.dataset.default = f.default ?? '';
        sel.dataset.role = 'model';
        // Placeholder while loading
        const loadOpt = document.createElement('option');
        loadOpt.value = ''; loadOpt.textContent = `(default: ${f.default || ''})`;
        sel.appendChild(loadOpt);
        modelSelects[f.name] = sel;

        // Custom model text input (hidden by default)
        const customInput = document.createElement('input');
        customInput.type = 'text';
        customInput.className = 'model-custom';
        customInput.name = f.name + '_custom';
        customInput.placeholder = 'Enter custom model ID...';

        sel.addEventListener('change', () => {
          customInput.classList.toggle('visible', sel.value === '__custom__');
          saveSettings();
        });
        bindAutoSave(sel);
        bindAutoSave(customInput);
        div.appendChild(sel);
        div.appendChild(customInput);
      } else if (f.widget === 'checkbox') {
        const wrap = document.createElement('div');
        wrap.className = 'checkbox-wrap';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.name = f.name;
        cb.checked = !!f.current;
        cb.dataset.default = String(f.default ?? false);
        const span = document.createElement('span');
        span.style.fontSize = '12px'; span.style.color = 'var(--dim)';
        const updateLabel = () => { span.textContent = cb.checked ? 'Enabled' : 'Disabled'; };
        applySaved(cb);
        updateLabel();
        cb.addEventListener('change', () => { updateLabel(); saveSettings(); });
        wrap.appendChild(cb); wrap.appendChild(span);
        div.appendChild(wrap);
      } else if (f.widget === 'password') {
        const input = document.createElement('input');
        input.name = f.name; input.type = 'password';
        input.dataset.default = '';
        input.placeholder = '(enter to override)';
        input.autocomplete = 'off';
        applySaved(input);
        bindAutoSave(input);
        div.appendChild(input);
      } else if (f.widget === 'number') {
        const input = document.createElement('input');
        input.name = f.name; input.type = 'number';
        input.value = f.current ?? '';
        input.dataset.default = f.default ?? '';
        input.placeholder = String(f.default ?? '');
        applySaved(input);
        bindAutoSave(input);
        div.appendChild(input);
      } else {
        const input = document.createElement('input');
        input.name = f.name; input.type = 'text';
        input.value = f.current ?? '';
        input.dataset.default = f.default ?? '';
        input.placeholder = f.default ?? '';
        applySaved(input);
        bindAutoSave(input);
        div.appendChild(input);
      }
      grid.appendChild(div);
    });

    // Fetch models for initial provider
    refreshModelList();
  }).catch(() => {});

  // ── Past reports ──
  async function loadReports() {
    try {
      const res = await fetch('/api/reports');
      const reports = await res.json();
      reportsList.innerHTML = '';
      reports.forEach(r => {
        const item = document.createElement('div');
        item.className = 'report-item';
        const dur = r.duration_seconds > 60
          ? `${Math.floor(r.duration_seconds/60)}m ${Math.round(r.duration_seconds%60)}s`
          : `${Math.round(r.duration_seconds)}s`;
        item.innerHTML = `
          <span class="query-text">${escHtml(r.query)}</span>
          <span class="meta">${r.source_count} sources · ${dur} · ${r.created_at?.slice(0,10) || ''}</span>
          <button class="del-btn" data-id="${r.session_id}">delete</button>`;
        item.querySelector('.query-text').onclick = () => viewReport(r.session_id);
        item.querySelector('.del-btn').onclick = async (e) => {
          e.stopPropagation();
          await fetch(`/api/reports/${r.session_id}`, { method: 'DELETE' });
          loadReports();
        };
        reportsList.appendChild(item);
      });
    } catch {}
  }

  async function viewReport(sid) {
    try {
      const res = await fetch(`/api/reports/${sid}`);
      const data = await res.json();
      reportSection.classList.add('visible');
      reportSection.innerHTML = marked.parse(data.report || '');
      reportSection.scrollIntoView({ behavior: 'smooth' });
    } catch {}
  }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ── Init ──
  connect();
  loadReports();
})();
</script>
</body>
</html>
