[general]
# Config schema version (SemVer)
version = "1.0.0"

# DEBUG | INFO | WARNING | ERROR
log_level = "INFO"

# XDG-compliant default path for data
data_dir = "~/.local/share/caw"

[storage]
# SQLite database path
db_path = "${data_dir}/caw.db"
# Trace event storage
trace_dir = "${data_dir}/traces"
# Generated artifact storage
artifact_dir = "${data_dir}/artifacts"

[providers]
# Default model provider key used for completion requests
default = "openrouter"


[providers.openrouter]
type = "openai_compatible"
# Environment variable containing the API key
api_key_env = "OPENROUTER_API_KEY"
# OpenRouter OpenAI-compatible endpoint
base_url = "https://openrouter.ai/api/v1"
default_model = "openai/gpt-4o-mini"
max_tokens = 4096
timeout_seconds = 120

[providers.anthropic]
type = "anthropic"
# Environment variable containing the API key
api_key_env = "ANTHROPIC_API_KEY"
default_model = "claude-sonnet-4-20250514"
max_tokens = 8192
timeout_seconds = 120

[providers.openai]
type = "openai"
api_key_env = "OPENAI_API_KEY"
default_model = "gpt-4o"
max_tokens = 4096
timeout_seconds = 120

[routing]
# config | cost | capability | latency
strategy = "config"
# Ordered list of providers to try if primary fails
fallback_chain = ["openrouter", "anthropic", "openai"]

[skills]
# Relative paths to skill directories
builtin_dir = "skills/builtin"
user_dir = "skills/user"
packs_dir = "skills/packs"

[workspace]
# strict | permissive | none
sandbox_mode = "permissive"
# Paths accessible in strict mode
allowed_paths = ["~", "/tmp"]
# Require human confirmation for dangerous actions
confirm_writes = true
confirm_deletes = true
confirm_executions = true

[evaluation]
tasks_dir = "tasks"
results_dir = "${data_dir}/eval_results"
default_scorer = "composite"

[api]
host = "127.0.0.1"
port = 8420
cors_origins = ["http://localhost:3000"]
